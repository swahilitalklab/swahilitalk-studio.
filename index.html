<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swahilitalk Producer Booth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green:      #2E7D32;
      --green-lt:   #4CAF50;
      --green-glow: rgba(46,125,50,0.35);
      --green-dim:  rgba(46,125,50,0.12);
      --bg:          #0D1117;
      --surface:    #161B22;
      --surface2:   #1F2937;
      --border:     rgba(46,125,50,0.25);
      --text:       #F0F6FC;
      --muted:      #8B949E;
      --white:      #FFFFFF;
      --red:        #F85149;
      --amber:      #E3B341;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(46,125,50,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,125,50,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,125,50,0.10) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }

    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .logo-mark {
      width: 36px; height: 36px;
      border: 2px solid var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px var(--green-glow);
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .voice-btn {
      flex: 1;
      padding: .65rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: all .18s;
      text-align: left;
    }
    .voice-btn:hover { border-color: var(--green); color: var(--text); }
    .voice-btn.active {
      border-color: var(--green-lt);
      background: var(--green-dim);
      color: var(--white);
      box-shadow: 0 0 12px var(--green-glow);
    }
    .voice-btn .vname { font-weight: 600; font-size: .9rem; }
    .voice-btn .vtag  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .voice-btn.active .vtag { color: var(--green-lt); }

    .speed-pill {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px; gap: 3px;
    }
    .speed-opt {
      flex: 1;
      padding: .4rem 1.1rem;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: .82rem; font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }
    .speed-opt.active {
      background: var(--green);
      color: var(--white);
      box-shadow: 0 0 10px var(--green-glow);
    }

    textarea {
      width: 100%; resize: vertical;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .95rem; line-height: 1.7;
      padding: 1.2rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      min-height: 200px;
    }
    textarea:focus {
      border-color: var(--green-lt);
      box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
    }
    textarea::placeholder { color: var(--muted); }

    .btn-generate {
      background: var(--green);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      letter-spacing: .04em;
      border: none; border-radius: 10px;
      padding: .9rem 2.2rem;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s, opacity .2s;
      box-shadow: 0 4px 20px var(--green-glow);
      display: flex; align-items: center; gap: .65rem;
    }
    .btn-generate:disabled { opacity: .5; cursor: not-allowed; }

    .btn-dl {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green-lt);
      font-family: 'Outfit', sans-serif;
      font-weight: 600; font-size: .88rem;
      border-radius: 8px;
      padding: .55rem 1.3rem;
      cursor: pointer;
      transition: background .18s, box-shadow .18s, transform .15s;
      display: flex; align-items: center; gap: .5rem;
    }

    .modal-backdrop {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--green);
      border-radius: 14px;
      padding: 2rem;
      width: min(92vw, 460px);
    }
    .token-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .7rem 1rem;
      outline: none;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    audio { width: 100%; border-radius: 8px; }

    .error-box {
      display: none;
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.35);
      border-radius: 8px;
      padding: .85rem 1rem;
      color: #F85149; font-size: .87rem;
    }
    .error-box.show { display: block; }
    #audio-result { display: none; }
    #audio-result.show { display: block; }
    .status-pill { display: none; }
    .status-pill.show { display: flex; align-items: center; gap: 8px; color: var(--green-lt); }
  </style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="modal-backdrop">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
      <h2 style="color:white;">⚙️ Booth Settings</h2>
      <button onclick="closeSettings()" style="color:white;cursor:pointer;">&times;</button>
    </div>
    <input id="hf-token" type="password" class="token-input" placeholder="hf_xxxxxx" />
    <div style="display:flex;gap:10px;margin-top:1rem;">
      <button onclick="saveToken()" style="background:var(--green);color:white;padding:10px;border-radius:5px;flex:1;cursor:pointer;">Save</button>
      <button onclick="clearToken()" style="border:1px solid var(--red);color:var(--red);padding:10px;border-radius:5px;flex:1;cursor:pointer;">Clear</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header class="header">
    <div style="max-width:760px;margin:0 auto;padding:1rem;display:flex;justify-content:space-between;align-items:center;">
      <h1 style="color:white;">Swahilitalk <span style="color:var(--green-lt);font-size:0.8rem;">PRODUCER BOOTH</span></h1>
      <button onclick="openSettings()" style="cursor:pointer;">⚙️</button>
    </div>
  </header>

  <main style="max-width:760px;margin:0 auto;padding:2rem 1rem;">
    <div id="token-warn" style="display:none;color:var(--amber);margin-bottom:1rem;">🔐 Add your token in settings.</div>

    <div style="display:flex;gap:10px;margin-bottom:1.5rem;">
      <button class="voice-btn active" data-voice="standard" onclick="selectVoice(this)">Standard Voice</button>
      <button class="voice-btn" data-voice="deep_male" onclick="selectVoice(this)">Deep Male</button>
    </div>

    <textarea id="story-text" placeholder="Andika hapa..."></textarea>
    
    <div style="margin-top:1rem;display:flex;align-items:center;gap:1rem;">
      <button id="gen-btn" class="btn-generate" onclick="generate()">🎙 Generate Narration</button>
      <div id="status-pill" class="status-pill"><div class="spinner"></div> Waking up AI...</div>
    </div>

    <div id="error-box" class="error-box"></div>

    <div id="audio-result" style="margin-top:2rem;">
      <button class="btn-dl" onclick="downloadAudio()">Download MP3</button>
      <audio id="audio-player" controls style="margin-top:1rem;"></audio>
    </div>
  </main>
</div>

<script>
const HF_MODEL = "msingiai/sauti-tts";
const LS_KEY   = "swahilitalk_hf_token";

const VOICE_PARAMS = {
  standard:    { seed: 42,  pitch_offset: 0  },
  deep_male:   { seed: 999, pitch_offset: -5 }
};

let currentVoice = "standard";
let audioBlob    = null;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) document.getElementById('hf-token').value = saved;
  else document.getElementById('token-warn').style.display = 'block';
});

function selectVoice(btn) {
  document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentVoice = btn.dataset.voice;
}

function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }

function saveToken() {
  const val = document.getElementById('hf-token').value.trim();
  localStorage.setItem(LS_KEY, val);
  document.getElementById('token-warn').style.display = 'none';
  closeSettings();
}

function clearToken() {
  localStorage.removeItem(LS_KEY);
  document.getElementById('hf-token').value = '';
}

async function generate() {
  const text = document.getElementById('story-text').value.trim();
  const token = localStorage.getItem(LS_KEY) || '';

  if (!text || !token) {
    alert("Please enter text and ensure your token is saved.");
    return;
  }

  setLoading(true);
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('audio-result').classList.remove('show');

  try {
    const params = VOICE_PARAMS[currentVoice];
    const payload = {
      inputs: text,
      parameters: { seed: params.seed, pitch_offset: params.pitch_offset },
      options: { wait_for_model: true }
    };

    const res = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const errTxt = await res.text();
      throw new Error(errTxt || "Failed to fetch from AI");
    }

    audioBlob = await res.blob();
    const url = URL.createObjectURL(audioBlob);
    const player = document.getElementById('audio-player');
    player.src = url;
    document.getElementById('audio-result').classList.add('show');

  } catch (err) {
    const errBox = document.getElementById('error-box');
    errBox.textContent = "Error: " + err.message;
    errBox.classList.add('show');
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('gen-btn');
  const pill = document.getElementById('status-pill');
  btn.disabled = on;
  pill.classList.toggle('show', on);
}

function downloadAudio() {
  if (!audioBlob) return;
  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "swahili_audio.mp3";
  a.click();
}
</script>
</body>
</html>
